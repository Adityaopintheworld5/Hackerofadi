<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hackerofadi To-Do Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- LEFT: USER HUD + LEADERBOARD -->
    <div>
        <div class="user-card">
            <h2>User Info</h2>
            <p><b>Username:</b> <span id="username"></span></p>
            <p><b>Points:</b> <span id="xp">0</span></p>
            <p><b>Level:</b> <span id="level">1</span></p>
            <p><b>Badges:</b> <span id="badges">None</span></p>
            <p><b>Streak:</b> <span id="streak">0</span> 🔥</p>
        </div>

        <h2>Leaderboard</h2>
        <div id="leaderboard"></div>
    </div>

    <!-- RIGHT: TODO TRACKER -->
    <div id="todo-tracker"></div>

</div>

<script src="js/app.js"></script>
<script>
    // ===== INIT TODO TRACKER =====
    initTodoTracker();

    // ===== OPTIONAL NAVIGATION =====
    // e.g., link back to dashboard
    const nav = document.createElement('a');
    nav.href = 'dashboard.html';
    nav.textContent = "← Back to Dashboard";
    nav.style.display = "block";
    nav.style.marginBottom = "1rem";
    nav.style.color = "#0ff";
    document.body.prepend(nav);
</script>

</body>
</html>
