<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hackerofadi Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== DASHBOARD IMPROVEMENTS ===== */
body { background:#111; color:#0f0; font-family: monospace; margin:0; padding:0; }
.container { width:90%; max-width:1000px; margin:20px auto; }

h1, h2 { color:#0ff; text-shadow:0 0 8px #0ff; }
h2 { margin-top:30px; }

.user-card { background:#222; padding:15px; border-left:4px solid #0f0; border-radius:5px; margin-bottom:20px; box-shadow:0 0 10px #0ff; }
.user-card p { margin:5px 0; }

.languages { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.lang-box { flex:1 1 120px; padding:10px; text-align:center; background:#222; cursor:pointer; border-left:4px solid #0f0; border-radius:5px; transition: all 0.2s; }
.lang-box:hover { box-shadow:0 0 10px #0ff; transform:scale(1.05); }

#leaderboard { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.user-box { background:#222; padding:10px; border-left:4px solid #ff0; border-radius:5px; flex:1 1 150px; text-align:center; box-shadow:0 0 8px #ff0; transition: all 0.2s; }
.user-box:hover { box-shadow:0 0 12px #f0f; transform:scale(1.02); }

/* ===== TODO TRACKER CONTAINER ===== */
#todo-tracker { margin-top:30px; }

</style>
</head>
<body>

<div class="container">

  <h1>💻 Hackerofadi Dashboard</h1>

  <!-- USER INFO -->
  <div class="user-card">
      <p><b>User:</b> <span id="username"></span></p>
      <p><b>Points:</b> <span id="points">0</span></p>
      <p><b>Level:</b> <span id="level">1</span></p>
      <p><b>Badges:</b> <span id="badges">None</span></p>
  </div>

  <!-- LANGUAGES -->
  <h2>🖥️ Languages</h2>
  <div class="languages">
      <div class="lang-box" onclick="goLessons('python')">Python</div>
      <div class="lang-box" onclick="goLessons('htmlcss')">HTML/CSS</div>
      <div class="lang-box" onclick="goLessons('javascript')">JavaScript</div>
      <div class="lang-box" onclick="goLessons('cybersecurity')">Cybersecurity</div>
      <div class="lang-box" onclick="goLessons('whitehat')">White Hat</div>
  </div>

  <!-- LEADERBOARD -->
  <h2>🏆 Active Users</h2>
  <div id="leaderboard"></div>

  <!-- TODO TRACKER -->
  <div id="todo-tracker"></div>

</div>

<script src="js/app.js"></script>
<script src="js/todo.js"></script>
<script>
// ===== USER LOAD =====
const currentUser = localStorage.getItem('currentUser');
if(!currentUser){
    alert("Login first");
    window.location.href = "index.html";
}

const user = JSON.parse(localStorage.getItem(currentUser));

// USER INFO
document.getElementById("username").textContent = currentUser;
document.getElementById("points").textContent = user.points;

// LEVEL
const level = Math.floor(user.points / 50) + 1;
document.getElementById("level").textContent = level;

// ===== BADGES =====
const badges = user.badges || [];
document.getElementById("badges").textContent = badges.length ? badges.join(', ') : "None";

// ===== LEADERBOARD =====
const leaderboard = document.getElementById("leaderboard");

let users = [];
for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(key !== "currentUser"){
        try {
            const data = JSON.parse(localStorage.getItem(key));
            if(data && data.points !== undefined){
                users.push({ name: key, points: data.points, completed: data.completed || [] });
            }
        } catch(e){ }
    }
}

users.sort((a,b) => b.points - a.points);

users.forEach((u, index) => {
    const div = document.createElement("div");
    div.className = "user-box";
    let achievement = "Beginner";
    if(u.points > 50) achievement = "Intermediate";
    if(u.points > 150) achievement = "Pro";
    div.innerHTML = `
        <b>#${index+1}</b> ${u.name}<br>
        ⭐ ${u.points} pts<br>
        🏆 ${achievement}
    `;
    leaderboard.appendChild(div);
});
</script>

</body>
</html>
