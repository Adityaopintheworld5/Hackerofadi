<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hackerofadi Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== BODY & CONTAINER ===== */
body {
    background:#111;
    color:#0f0;
    font-family: monospace;
    margin:0;
    padding:0;
}
.container {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap:20px;
    width:95%;
    max-width:1200px;
    margin:20px auto;
}

/* ===== USER STATS ===== */
.user-card {
    background:#222;
    padding:20px;
    border-left:4px solid #0f0;
    border-radius:5px;
    box-shadow:0 0 10px #0ff;
}
.user-card p { margin:10px 0; font-weight:bold; }
#xp, #level { color:#ff0; }

/* ===== LANGUAGES ===== */
.languages {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
}
.lang-box {
    flex:1 1 120px;
    padding:10px;
    text-align:center;
    background:#222;
    cursor:pointer;
    border-left:4px solid #0f0;
    border-radius:5px;
    transition: all 0.2s;
}
.lang-box:hover { box-shadow:0 0 10px #0ff; transform:scale(1.05); }

/* ===== LEADERBOARD ===== */
#leaderboard {
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:20px;
}
.user-box {
    background:#222;
    padding:10px;
    border-left:4px solid #ff0;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    box-shadow:0 0 8px #ff0;
    transition: all 0.2s;
}
.user-box:hover { box-shadow:0 0 12px #f0f; transform:scale(1.02); }

/* ===== TODO TRACKER ===== */
#todo-tracker {
    background:#222;
    padding:15px;
    border-left:4px solid #f0f;
    border-radius:5px;
    box-shadow:0 0 10px #f0f;
    max-height:600px;
    overflow-y:auto;
}
#todo-tracker h2 { color:#f0f; text-shadow:0 0 5px #f0f; }
#todo-tracker input, #todo-tracker select, #todo-tracker button {
    margin:5px 0;
    padding:8px;
    border:none;
    border-radius:4px;
    font-family: monospace;
}
#task-list li {
    background:#111;
    margin:5px 0;
    padding:8px;
    border-left:3px solid #0ff;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
#task-list li.done { text-decoration:line-through; opacity:0.6; border-color:#0f0; }
.deadline { margin-left:10px; font-size:12px; color:#ff0; }

/* ===== COMPLETION POPUP ===== */
.completion-popup {
    position:fixed;
    top:20px;
    right:20px;
    background:#0ff;
    color:#111;
    padding:10px 15px;
    border-radius:5px;
    box-shadow:0 0 15px #0ff;
    font-family:monospace;
    font-weight:bold;
    z-index:9999;
}
</style>
</head>
<body>

<div class="container">
    <!-- LEFT: USER STATS -->
    <div>
        <div class="user-card">
            <h2>User Info</h2>
            <p><b>Username:</b> <span id="username"></span></p>
            <p><b>Points:</b> <span id="xp">0</span></p>
            <p><b>Level:</b> <span id="level">1</span></p>
            <p><b>Badges:</b> <span id="badges">None</span></p>
            <p><b>Streak:</b> <span id="streak">0</span> 🔥</p>
        </div>

        <h2>Languages</h2>
        <div class="languages">
            <div class="lang-box" onclick="goLessons('python')">Python</div>
            <div class="lang-box" onclick="goLessons('htmlcss')">HTML/CSS</div>
            <div class="lang-box" onclick="goLessons('javascript')">JavaScript</div>
            <div class="lang-box" onclick="goLessons('cybersecurity')">Cybersecurity</div>
            <div class="lang-box" onclick="goLessons('whitehat')">White Hat</div>
        </div>

        <h2>Leaderboard</h2>
        <div id="leaderboard"></div>
    </div>

    <!-- RIGHT: TODO TRACKER -->
    <div id="todo-tracker"></div>
</div>

<script src="js/app.js"></script>
<script src="js/todo.js"></script>
<script>
// ===== USER LOAD =====
if(!currentUser){
    alert("Login first");
    window.location.href="index.html";
}

document.getElementById("username").textContent = currentUser;
document.getElementById("xp").textContent = user.points;
document.getElementById("level").textContent = Math.floor(user.points/50)+1;
document.getElementById("badges").textContent = user.badges.length ? user.badges.join(', ') : "None";
document.getElementById("streak").textContent = user.streak;

// ===== LEADERBOARD =====
const leaderboard = document.getElementById("leaderboard");
let users = [];
for(let i=0;i<localStorage.length;i++){
    const key = localStorage.key(i);
    if(key!=="currentUser"){
        try{
            const data = JSON.parse(localStorage.getItem(key));
            if(data && data.points!==undefined) users.push({name:key, points:data.points});
        }catch(e){}
    }
}
users.sort((a,b)=>b.points-a.points);
users.forEach((u,index)=>{
    const div = document.createElement("div");
    div.className="user-box";
    div.innerHTML = `<span>#${index+1} ${u.name}</span><span>⭐ ${u.points}</span>`;
    leaderboard.appendChild(div);
});
</script>

</body>
</html>
