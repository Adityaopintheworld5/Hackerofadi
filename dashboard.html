<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .user-card {
            background: #161b22;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .languages {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .lang-box {
            background: #21262d;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .lang-box:hover {
            background: #30363d;
        }

        /* ✅ IMAGE FIXED */
        .profile-img {
            width: 250px;
            height: auto;
            border-radius: 12px;
            border: 2px solid #00ff9f;
            display: block;
            margin: 10px auto;
        }

        .user-box {
            background: #161b22;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Dashboard</h1>

<div class="user-card">
    <p><b>User:</b> <span id="username"></span></p>
    <p><b>Points:</b> <span id="points">0</span></p>
    <p><b>Level:</b> <span id="level">1</span></p>
    <p><b>Badges:</b> <span id="badges">None</span></p>
</div>

<h2>Languages</h2>

<!-- ✅ IMAGE TEST -->
<img src="adi.jpg" alt="HELLO IMAGE NOT FOUND" class="profile-img">

<div class="languages">
    <div class="lang-box" onclick="goLessons('python')">Python</div>
    <div class="lang-box" onclick="goLessons('htmlcss')">HTML/CSS</div>
    <div class="lang-box" onclick="goLessons('javascript')">JavaScript</div>
    <div class="lang-box" onclick="goLessons('cybersecurity')">Cybersecurity</div>
    <div class="lang-box" onclick="goLessons('whitehat')">White Hat</div>
</div>

<h2>🏆 Active Users</h2>
<div id="leaderboard"></div>

</div>

<script>
function goLessons(lang){
    alert("Go to " + lang);
}

// ===== USER LOAD =====
const currentUser = localStorage.getItem('currentUser');

if(!currentUser){
    localStorage.setItem("testUser", JSON.stringify({
        points: 120,
        badges: ["Starter"]
    }));
    localStorage.setItem("currentUser", "testUser");
}

// reload values
const userName = localStorage.getItem("currentUser");
const user = JSON.parse(localStorage.getItem(userName));

// USER INFO
document.getElementById("username").textContent = userName;
document.getElementById("points").textContent = user.points;

// LEVEL
const level = Math.floor(user.points / 50) + 1;
document.getElementById("level").textContent = level;

// BADGES
const badges = user.badges || [];
document.getElementById("badges").textContent =
    badges.length ? badges.join(', ') : "None";

// LEADERBOARD
const leaderboard = document.getElementById("leaderboard");

let users = [];

for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);

    if(key !== "currentUser"){
        try {
            const data = JSON.parse(localStorage.getItem(key));

            if(data && data.points !== undefined){
                users.push({
                    name: key,
                    points: data.points
                });
            }
        } catch(e){}
    }
}

users.sort((a,b) => b.points - a.points);

users.forEach((u, index) => {
    const div = document.createElement("div");
    div.className = "user-box";

    div.innerHTML = `
        <b>#${index+1}</b> ${u.name}<br>
        ⭐ ${u.points} pts
    `;

    leaderboard.appendChild(div);
});
</script>

</body>
</html>
