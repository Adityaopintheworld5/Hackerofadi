<h1>JavaScript Variables</h1>

<p>
A variable stores data. Think of it like a labeled box 📦.
You put something inside, and use the label to access it.
</p>

<div class="code-box">
let name = "<span id="slot">???</span>";
</div>

<h3>What does this do?</h3>
<p>
It creates a variable called <b>name</b> and stores a value inside it.
</p>
